x-shared-env: &shared-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: ${APP_KEY}
  APP_LOCALE: es
  APP_URL: https://${DOMAIN:-localhost}
  DOMAIN: ${DOMAIN:-localhost}
  LOG_LEVEL: error

  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-salones}
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD}

  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}

  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  SESSION_LIFETIME: 120
  SESSION_ENCRYPT: "true"
  BROADCAST_CONNECTION: reverb
  FILESYSTEM_DISK: local

  CORS_ALLOWED_ORIGINS: https://${DOMAIN:-localhost}
  SANCTUM_STATEFUL_DOMAINS: ${DOMAIN:-localhost}

x-web-env: &web-env
  <<: *shared-env
  OCTANE_SERVER: frankenphp
  OCTANE_HTTPS: "true"
  OCTANE_WATCH: "false"
  OCTANE_WORKERS: ${OCTANE_WORKERS:-3}
  OCTANE_MAX_EXECUTION_TIME: ${OCTANE_MAX_EXECUTION_TIME:-60}
  OCTANE_MAX_REQUESTS: ${OCTANE_MAX_REQUESTS:-1000}

  REVERB_APP_ID: ${REVERB_APP_ID:-salones}
  REVERB_APP_KEY: ${REVERB_APP_KEY:-salones-key}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET}
  REVERB_HOST: 0.0.0.0
  REVERB_PORT: 8080
  REVERB_SCHEME: http
  REVERB_ALLOWED_ORIGINS: https://${DOMAIN:-localhost}

  HORIZON_ENV: production

x-build: &build-def
  context: .
  dockerfile: Dockerfile
  args:
    VITE_API_URL: https://${DOMAIN:-localhost}/api
    VITE_REVERB_HOST: ${DOMAIN:-localhost}
    VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-salones-key}
    VITE_REVERB_PORT: "443"
    VITE_REVERB_SCHEME: https

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-salones}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  app:
    build: *build-def
    restart: unless-stopped
    command: /app/docker-entrypoint-web.sh
    ports:
      - "8081:80"
    environment:
      <<: *web-env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - app_storage:/app/storage

  horizon:
    build: *build-def
    restart: unless-stopped
    command: /app/docker-entrypoint-horizon.sh
    environment:
      <<: *shared-env
      HORIZON_ENV: production
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      app:
        condition: service_started
    volumes:
      - app_storage:/app/storage

  reverb:
    build: *build-def
    restart: unless-stopped
    command: /app/docker-entrypoint-reverb.sh
    ports:
      - "8080:8080"
    environment:
      <<: *shared-env
      REVERB_APP_ID: ${REVERB_APP_ID:-salones}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-salones-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_ALLOWED_ORIGINS: https://${DOMAIN:-localhost}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      app:
        condition: service_started

  scheduler:
    build: *build-def
    restart: unless-stopped
    command: /app/docker-entrypoint-scheduler.sh
    environment:
      <<: *shared-env
    depends_on:
      postgres:
        condition: service_started
      app:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  app_storage:
