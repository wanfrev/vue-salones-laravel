# Luma (Salones) — Docker Compose para desarrollo local
#
# Servicios:
#   - PostgreSQL 16 (independiente, sin Supabase)
#   - Redis (queues, cache, horizon)
#
# Uso:
#   docker compose up -d              # Inicia todo
#   docker compose down               # Detiene todo
#   docker compose down -v            # Detiene + borra volúmenes (BD se pierde)

services:
  postgres:
    image: postgres:16-alpine
    container_name: luma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: salones
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: luma-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  pgdata:
  redisdata:
